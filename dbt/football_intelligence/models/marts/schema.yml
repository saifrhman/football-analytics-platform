version: 2

models:
  - name: dim_players
    columns:
      - name: player_id
        tests:
          - not_null
          - unique

  - name: dim_teams
    columns:
      - name: team_id
        tests:
          - not_null
          - unique

  - name: dim_matches
    columns:
      - name: match_id
        tests:
          - not_null
          - unique

  - name: dim_competitions
    columns:
      - name: competition_id
        tests:
          - not_null
      - name: season_id
        tests:
          - not_null

  - name: dim_seasons
    columns:
      - name: season_id
        tests:
          - not_null
          - unique

  - name: fact_events
    columns:
      - name: event_id
        tests:
          - not_null
          - unique
      - name: match_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_matches')
                field: match_id

  - name: fact_shots
    columns:
      - name: event_id
        tests:
          - not_null
          - unique
      - name: match_id
        tests:
          - not_null

  - name: fact_passes
    columns:
      - name: event_id
        tests:
          - not_null
          - unique
      - name: match_id
        tests:
          - not_null

  - name: fact_pressures
    columns:
      - name: event_id
        tests:
          - not_null
          - unique
      - name: match_id
        tests:
          - not_null
