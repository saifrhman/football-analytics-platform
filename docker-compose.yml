services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    env_file: .env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./src:/app/src
    command: uvicorn football_intelligence.api.main:app --host 0.0.0.0 --port 8000 --reload

  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit/Dockerfile
    env_file: .env
    ports:
      - "${STREAMLIT_SERVER_PORT:-8501}:8501"
    volumes:
      - ./src:/app/src
    command: streamlit run src/football_intelligence/dashboard/app.py --server.address 0.0.0.0

  airflow:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
      - ./dbt:/opt/airflow/dbt
    command: standalone

  dbt:
    image: ghcr.io/dbt-labs/dbt-bigquery:1.8.latest
    env_file: .env
    working_dir: /usr/app/dbt/football_intelligence
    volumes:
      - ./dbt:/usr/app/dbt
      - ${GOOGLE_APPLICATION_CREDENTIALS:-/tmp/credentials.json}:${GOOGLE_APPLICATION_CREDENTIALS:-/tmp/credentials.json}:ro
    entrypoint: ["dbt"]
    command: ["--help"]
