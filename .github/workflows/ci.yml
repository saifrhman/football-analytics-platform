name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests airflow/dags
      - name: Test
        run: pytest

  dbt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dbt
        run: python -m pip install dbt-bigquery
      - name: Prepare dbt parse environment
        run: |
          cat > /tmp/gcp-ci-placeholder.json <<'JSON'
          {
            "type": "service_account",
            "project_id": "ci-placeholder",
            "private_key_id": "placeholder",
            "private_key": "-----BEGIN PRIVATE KEY-----\nplaceholder\n-----END PRIVATE KEY-----\n",
            "client_email": "ci-placeholder@example.iam.gserviceaccount.com",
            "client_id": "000000000000000000000",
            "auth_uri": "https://accounts.google.com/o/oauth2/auth",
            "token_uri": "https://oauth2.googleapis.com/token",
            "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
            "client_x509_cert_url": "https://www.googleapis.com/robot/v1/metadata/x509/ci-placeholder"
          }
          JSON
      - name: Parse dbt project
        env:
          GCP_PROJECT_ID: ci-placeholder
          BIGQUERY_DATASET_BRONZE: football_bronze
          BIGQUERY_DATASET_SILVER: football_silver
          BIGQUERY_DATASET_GOLD: football_gold
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-ci-placeholder.json
          GCP_REGION: europe-west2
        run: dbt parse --project-dir dbt/football_intelligence --profiles-dir dbt/football_intelligence
